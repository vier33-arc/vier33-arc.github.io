<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not found</title>
    <script>
      (function () {
        var l = window.location;
        var parts = l.pathname.split("/").filter(Boolean);
        var first = parts[0] || "";
        var isProjectPages = first && !first.includes(".") && first !== "404.html";
        var base = isProjectPages ? "/" + first + "/" : "/";
        var route = isProjectPages ? l.pathname.slice(base.length) : l.pathname.slice(1);
        var newUrl = base + "?/" + route.replace(/&/g, "~and~") + l.search + l.hash;
        l.replace(newUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
